---
apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: verify-image-keyless
spec:
  webhookConfiguration:
    timeoutSeconds: 30
  evaluation:
    background:
      enabled: false
  validationActions:
    - Deny
  matchConstraints:
    resourceRules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - pods
  matchImageReferences:
    - glob: ghcr.io/elmerbulthuis/cnpe-*
  attestors:
    - name: cosign
      cosign:
        keyless:
          identities:
            - subject: https://github.com/elmerbulthuis/cnpe/.github/workflows/release.yaml@refs/heads/kyverno
              issuer: https://token.actions.githubusercontent.com
        ctlog:
          url: https://rekor.sigstore.dev
  validations:
    - expression: images.containers.map(image, verifyImageSignatures(image, [attestors.cosign])).all(e ,e > 0)
      message: failed the verification

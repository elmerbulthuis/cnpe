---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: hi1
  name: hi1
spec:
  selector:
    matchLabels:
      app: hi1
  template:
    metadata:
      labels:
        app: hi1
    spec:
      initContainers:
        - name: initialize
          image: alpine:3.24
          command:
            - sh
            - -c
            - echo $MESSAGE > /srv/wwwroot/index.html
          env:
            - name: MESSAGE
              value: "Hello 1"
          resources:
            requests:
              cpu: 10m
              memory: 10Mi
            limits:
              cpu: 100m
              memory: 100Mi
          volumeMounts:
            - name: wwwroot
              mountPath: /srv/wwwroot
          securityContext:
            runAsUser: 65534 # nobody
            runAsGroup: 65534 # nobody
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      containers:
        - name: server
          image: python:3-alpine
          command:
            - python
            - -m
            - http.server
            - -d
            - /srv/wwwroot
            - "8080"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 10Mi
            limits:
              cpu: 200m
              memory: 200Mi
          volumeMounts:
            - name: wwwroot
              mountPath: /srv/wwwroot
          securityContext:
            runAsUser: 65534 # nobody
            runAsGroup: 65534 # nobody
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: wwwroot
          emptyDir: {}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: hi1
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hi1
  progressDeadlineSeconds: 60
  service:
    port: 8080
    gatewayRefs:
      - name: hi1
  analysis:
    interval: 1s
    threshold: 5
    maxWeight: 50
    stepWeight: 10
    metrics: []

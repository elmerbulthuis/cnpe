---
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: hello
spec:
  podSelector:
    matchLabels:
      app: hello
  port: 8080
  proxyProtocol: "HTTP/1"
---
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: allow-hello-client
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: hello
  requiredAuthenticationRefs:
    - kind: ServiceAccount
      name: default
      namespace: hello-client
---
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: linkerd-metrics
spec:
  podSelector:
    matchLabels:
      linkerd.io/control-plane-ns: linkerd
  port: 4191
---
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: allow-prometheus
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: linkerd-metrics
  requiredAuthenticationRefs:
    - kind: ServiceAccount
      name: prometheus
      namespace: monitoring
---
apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: verify-image
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: verify-image
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - ghcr.io/elmerbulthuis/cnpe-*
          attestors:
            - entries:
                - keyless:
                    subjectRegExp: https://github.com/elmerbulthuis/cnpe/.*
                    issuer: https://token.actions.githubusercontent.com
                    rekor:
                      url: https://rekor.sigstore.dev

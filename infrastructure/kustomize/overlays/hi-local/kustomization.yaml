namespace: hi

resources:
  - ../../bases/hi

patches:
  - target:
      kind: Rollout
      name: hi-bluegreen
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Rollout
      name: hi-canary
    patch: |
      - op: replace
        path: /spec/replicas
        value: 4

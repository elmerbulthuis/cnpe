---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: elmerbulthuis-cnpe
spec:
  interval: 2m
  url: https://github.com/elmerbulthuis/cnpe.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: environment
spec:
  interval: 2m
  sourceRef:
    kind: GitRepository
    name: elmerbulthuis-cnpe
  path: infrastructure/kustomize/overlays/environment-local
  prune: false
  timeout: 1m
  kustomize:
    enableHelm: true

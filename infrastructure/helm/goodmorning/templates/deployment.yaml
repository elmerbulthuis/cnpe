apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: goodmorning
  name: goodmorning
spec:
  selector:
    matchLabels:
      app: goodmorning
  template:
    metadata:
      labels:
        app: goodmorning
    spec:
      containers:
        - command:
            - python
            - -m
            - http.server
            - -d
            - /srv/wwwroot
            - "8080"
          image: python:3-alpine
          name: python
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 10Mi
            limits:
              cpu: 100m
              memory: 100Mi
          volumeMounts:
            - name: wwwroot
              mountPath: /srv/wwwroot
          securityContext:
            runAsUser: 65534 # nobody
            runAsGroup: 65534 # nobody
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: wwwroot
          configMap:
            name: goodmorning-wwwroot
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

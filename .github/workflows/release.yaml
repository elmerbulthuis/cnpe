on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  release-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: go-task/setup-task@v1
        with:
          version: "3.50"
      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main
        with:
          version: "2.9.1"
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: task build:kustomize build:helm
      - name: Push manifests
        run: >
          flux push
          artifact oci://ghcr.io/${{ github.repository }}-manifests:${{ github.sha }}
          --path="./dist"
          --source="${{ github.server_url }}/${{ github.repository }}.git"
          --revision="${{ github.sha }}"

  release-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        container-image:
          - hello
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository }}-${{ matrix.container-image }}:${{ github.sha }}
          file: container-images/${{ matrix.container-image }}.containerfile

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the container image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}-${{ matrix.container-image }}@${DIGEST}
